services:
  - type: web
    name: groweasy-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LLM_PROVIDER
        value: gemini
      - key: AI_MODEL_NAME
        value: gemini-2.5-flash
      - key: AI_TEMPERATURE
        value: "0"
      - key: ALLOWED_ORIGINS
        value: https://groweasy-web.onrender.com,http://localhost:3000
      - key: AI_API_KEY
        sync: false

  - type: web
    name: groweasy-web
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://groweasy-api.onrender.com
